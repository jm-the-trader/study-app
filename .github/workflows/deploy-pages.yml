name: Deploy to GitHub Pages

# Builds the Vite app and publishes the static site to GitHub Pages.
# Runs on every push to main, and can be triggered manually.
#
# Setup (one time):
#   1. Repo Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. (Optional but recommended) Repo Settings → Secrets and variables →
#      Actions → Variables → add VITE_STUDYFORGE_PASSWORD_HASH = sha256 of your
#      password. Without it, the app uses the default password "changeme".
#      Compute a hash:  printf '%s' 'your-password' | shasum -a 256 | cut -d' ' -f1

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Project sites are served from /<repo>/ — set the Vite base path.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Password gate: from a repo Variable if set, else the in-source default.
          VITE_STUDYFORGE_PASSWORD_HASH: ${{ vars.VITE_STUDYFORGE_PASSWORD_HASH }}
        run: npm run build

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
